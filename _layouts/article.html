---
layout: default
---

<article class="article">
  <div class="article-kicker">
    {{ page.category }}{% if page.level %} / {{ page.level }}{% endif %}
  </div>

  <h1>{{ page.title }}</h1>

  {% if page.excerpt %}
    <p class="article-excerpt">{{ page.excerpt }}</p>
  {% endif %}

  <div class="article-body">
    {{ content }}
  </div>
</article>
