{% assign T = include.T | default: "92" %}
{% assign R = include.R | default: "8" %}
{% assign ratio = include.ratio | default: "50:50" %}

<figure class="qubit-graphic">
  <svg viewBox="0 0 1100 520" role="img" aria-labelledby="path-qubit-title path-qubit-desc">
    <title id="path-qubit-title">Dari kaca jendela ke qubit jalur</title>
    <desc id="path-qubit-desc">
      Diagram cahaya diteruskan dan dipantulkan, beam splitter, dan qubit jalur satu foton.
    </desc>

    <!-- Background -->
    <rect x="0" y="0" width="1100" height="520" rx="24" class="qg-bg"/>

    <!-- Title -->
    <text x="550" y="48" text-anchor="middle" class="qg-title">
      Dari Kaca Jendela ke Qubit
    </text>
    <text x="550" y="78" text-anchor="middle" class="qg-subtitle">
      cahaya diteruskan + dipantulkan → satu foton → qubit jalur
    </text>

    <!-- Section 1: Window -->
    <g transform="translate(45,120)">
      <text x="0" y="0" class="qg-section">1. Kaca biasa</text>

      <!-- Incoming beam -->
      <line x1="0" y1="145" x2="150" y2="145" class="qg-beam-red"/>
      <text x="0" y="125" class="qg-label">cahaya masuk</text>

      <!-- Glass pane -->
      <polygon points="170,70 205,50 205,220 170,240" class="qg-glass"/>
      <line x1="177" y1="78" x2="177" y2="232" class="qg-glass-edge"/>

      <!-- Reflected beam -->
      <line x1="188" y1="145" x2="285" y2="70" class="qg-beam-red"/>
      <text x="245" y="55" class="qg-label-red">dipantulkan ~{{ R }}%</text>

      <!-- Transmitted beam -->
      <line x1="188" y1="145" x2="320" y2="145" class="qg-beam-yellow"/>
      <text x="230" y="175" class="qg-label-yellow">diteruskan ~{{ T }}%</text>

      <text x="0" y="290" class="qg-note">
        Pada kaca biasa, sebagian besar cahaya lewat,
      </text>
      <text x="0" y="314" class="qg-note">
        sebagian kecil tampak sebagai pantulan.
      </text>
    </g>

    <!-- Arrow -->
    <path d="M390 260 L430 235 L430 252 L465 252 L465 268 L430 268 L430 285 Z" class="qg-arrow"/>

    <!-- Section 2: Beam splitter -->
    <g transform="translate(500,120)">
      <text x="0" y="0" class="qg-section">2. Beam splitter</text>

      <!-- Beam splitter cube -->
      <rect x="95" y="70" width="120" height="120" class="qg-cube"/>
      <line x1="95" y1="190" x2="215" y2="70" class="qg-diagonal"/>

      <!-- Incoming -->
      <line x1="0" y1="130" x2="95" y2="130" class="qg-beam-red"/>
      <text x="0" y="110" class="qg-label">foton masuk</text>

      <!-- Reflected -->
      <line x1="155" y1="130" x2="155" y2="35" class="qg-beam-red"/>
      <text x="175" y="45" class="qg-label-red">R</text>

      <!-- Transmitted -->
      <line x1="155" y1="130" x2="280" y2="130" class="qg-beam-yellow"/>
      <text x="255" y="115" class="qg-label-yellow">T</text>

      <rect x="20" y="245" width="90" height="42" rx="12" class="qg-badge"/>
      <text x="65" y="273" text-anchor="middle" class="qg-badge-text">{{ ratio }}</text>

      <text x="125" y="258" class="qg-note">Rasio dapat dirancang:</text>
      <text x="125" y="282" class="qg-note">50:50, 70:30, 90:10, dst.</text>
    </g>

    <!-- Arrow -->
    <path d="M785 260 L825 235 L825 252 L860 252 L860 268 L825 268 L825 285 Z" class="qg-arrow"/>

    <!-- Section 3: Path qubit -->
    <g transform="translate(895,120)">
      <text x="0" y="0" class="qg-section">3. Qubit jalur</text>

      <!-- Single photon -->
      <circle cx="70" cy="80" r="8" class="qg-photon"/>
      <line x1="70" y1="90" x2="70" y2="135" class="qg-beam-red qg-dashed"/>
      <text x="25" y="62" class="qg-label">satu foton</text>

      <!-- Beam splitter -->
      <rect x="25" y="135" width="90" height="90" class="qg-cube"/>
      <line x1="25" y1="225" x2="115" y2="135" class="qg-diagonal"/>

      <!-- Two paths -->
      <line x1="70" y1="180" x2="10" y2="280" class="qg-beam-red"/>
      <line x1="70" y1="180" x2="150" y2="280" class="qg-beam-yellow"/>

      <text x="0" y="310" class="qg-label-red">|R⟩</text>
      <text x="135" y="310" class="qg-label-yellow">|T⟩</text>

      <text x="0" y="365" class="qg-equation">|ψ⟩ = α|T⟩ + β|R⟩</text>
      <text x="0" y="405" class="qg-note">|0⟩ ≡ |T⟩,  |1⟩ ≡ |R⟩</text>
    </g>
  </svg>

  <figcaption>
    Untuk banyak foton, kaca membagi energi cahaya. Untuk satu foton, beam splitter membentuk keadaan kuantum di atas dua kemungkinan jalur.
  </figcaption>
</figure>
